apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: scraper
spec:
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U scraper; do echo waiting for postgres; sleep 2; done
      containers:
        - name: migrate
          image: <registry>/scraper-job-manager:latest
          command: [npx, prisma, migrate, deploy]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scraper-secrets
                  key: DATABASE_URL
  backoffLimit: 3
