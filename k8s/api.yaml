apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: scraper
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: <registry>/scraper-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: scraper-config
            - secretRef:
                name: scraper-secrets

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: scraper
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 3000
